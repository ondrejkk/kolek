<!DOCTYPE html>
<html lang="cs">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kazatel</title>
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
    }

    object {
      width: 100%;
      height: 100vh;
      /* celé okno pro PDF */
    }

    .fallback {
      display: none;
      text-align: center;
      padding: 20px;
    }

    @media (max-width: 768px) {
      object {
        display: none;
        /* mobilní zařízení skryje embed */
      }

      .fallback {
        display: block;
        /* mobilní zařízení zobrazí odkaz */
      }
    }
  </style>
</head>

<body>

  <!-- PDF embed pro desktop -->
  <object data="/kazatel.pdf" type="application/pdf">
    <p>Váš prohlížeč nepodporuje PDF. Klikněte <a href="/kazatel.pdf">zde</a> pro stažení.</p>
  </object>

  <!-- Fallback pro mobilní zařízení -->
  <div class="fallback">
    <p>Na mobilu otevři PDF přímo kliknutím na odkaz:</p>
    <a href="/kazatel.pdf">Otevřít PDF</a>
  </div>

</body>

</html>
